name: CI/CD Evaluacion Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  integracion-continua:
    name: Pruebas, build, contenedor y seguridad
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Dar permisos a Maven Wrapper
        run: chmod +x mvnw

      - name: Ejecutar pruebas automatizadas
        run: ./mvnw clean test

      - name: Empaquetar aplicacion
        run: ./mvnw clean package -DskipTests

      - name: Construir imagen Docker
        run: docker build -t evaluacionpipeline:latest .

      - name: Escaneo de seguridad de imagen Docker con Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: evaluacionpipeline:latest
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  entrega-continua:
    name: Despliegue simulado con Docker Compose
    runs-on: ubuntu-latest
    needs: integracion-continua

    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Levantar entorno simulado
        run: |
          docker compose up -d --build
          sleep 35

      - name: Validar healthcheck
        run: curl --fail http://localhost:8090/actuator/health

      - name: Validar endpoint funcional
        run: curl --fail http://localhost:8090/api/productos

      - name: Mostrar estado de contenedores
        run: docker compose ps

      - name: Mostrar logs del despliegue
        if: always()
        run: docker compose logs

      - name: Apagar entorno simulado
        if: always()
        run: docker compose down