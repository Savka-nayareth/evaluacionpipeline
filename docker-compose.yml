services:
  api:
    build: .
    image: evaluacionpipeline:local
    expose:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: "0.50"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  gateway:
    image: nginx:stable-alpine
    ports:
      - "8090:80"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - app-network

networks:
  app-network:
    driver: bridge